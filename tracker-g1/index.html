<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נבחרת הקריאה - כיתה ג'1</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Assistant', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .container { background: white; width: 100%; max-width: 450px; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { color: #1e293b; font-size: 1.8rem; margin: 0; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 700; color: #475569; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #4f46e5; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 נבחרת הקריאה</h1>
            <p>כיתה ג'1 - אימון קריאה יומי</p>
        </div>
        <form id="reading-form">
            <div class="form-group">
                <label>שם התלמיד/ה</label>
                <select id="studentName" required>
                    <option value="">בחרו שם...</option>
                    </select>
            </div>
            <div class="form-group">
                <label>כמה דקות קראת?</label>
                <input type="number" id="minutes" required min="1">
            </div>
            <div class="form-group">
                <label>שם הספר</label>
                <input type="text" id="bookName" required>
            </div>
            <div class="form-group">
                <label>איך היה האימון?</label>
                <select id="feeling">
                    <option value="מעולה">🤩 מעולה</option>
                    <option value="נחמד">😊 נחמד</option>
                    <option value="קצת קשה">😥 קצת קשה</option>
                </select>
            </div>
            <button type="submit">שלח דיווח</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
