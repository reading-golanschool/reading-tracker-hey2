<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נבחרת הקריאה של כיתה ג'1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: white; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 450px; padding: 2.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">💪🧠 נבחרת הקריאה ג'1</h1>
            <p class="text-gray-500 mt-2">חדר כושר למוח</p>
        </div>

        <form id="readingForm" class="space-y-5 text-right">
            <div>
                <label class="block font-bold text-gray-700 mb-2">🙋‍♂️ מה שמך?</label>
                <select id="studentName" required class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-indigo-500 outline-none transition-all">
                    <option value="">בחרי את שמך...</option>
                    <option value="אביגיל">אביגיל</option>
                    <option value="מתן">מתן</option>
                    </select>
            </div>

            <div>
                <label class="block font-bold text-gray-700 mb-2">📚 מה קראת היום?</label>
                <input type="text" id="readingMaterial" placeholder="שם הספר / כתבה / קומיקס" required class="w-full border-2 border-gray-100 rounded-xl p-3 focus:border-indigo-500 outline-none transition-all">
            </div>

            <div>
                <label class="block font-bold text-gray-700 mb-2">💭 איך הרגשת באימון?</label>
                <div class="flex justify-around bg-gray-50 p-3 rounded-xl">
                    <label class="cursor-pointer text-center"><input type="radio" name="feeling" value="מעולה" checked class="hidden peer"><span class="block text-2xl grayscale peer-checked:grayscale-0 transition-all">😍</span><span class="text-xs">היה חלק</span></label>
                    <label class="cursor-pointer text-center"><input type="radio" name="feeling" value="נחמד" class="hidden peer"><span class="block text-2xl grayscale peer-checked:grayscale-0 transition-all">😊</span><span class="text-xs">היה בסדר</span></label>
                    <label class="cursor-pointer text-center"><input type="radio" name="feeling" value="קשה" class="hidden peer"><span class="block text-2xl grayscale peer-checked:grayscale-0 transition-all">😥</span><span class="text-xs">היה קשה</span></label>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition-all flex justify-center items-center">
                🎯 שלח דיווח ותרום 10 דקות!
            </button>
        </form>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyEJi8Y9QD_8XVqiip2cujEhV6Ue9GySSpekmr_-wYdP_MbgY0LJGfukencB7HDCji-Ag/exec';

        document.getElementById('readingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = '⏳ שולח...';

            const data = {
                studentName: document.getElementById('studentName').value,
                readingMaterial: document.getElementById('readingMaterial').value,
                feeling: document.querySelector('input[name="feeling"]:checked').value,
                date: new Date().toLocaleDateString('he-IL'),
                minutes: 10
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert('כל הכבוד! הדיווח עבר בהצלחה 🌟');
                this.reset();
            } catch (error) {
                alert('אופס, היתה שגיאה. נסי שוב.');
            } finally {
                btn.disabled = false;
                btn.innerText = '🎯 שלח דיווח ותרום 10 דקות!';
            }
        });
    </script>
</body>
</html>
